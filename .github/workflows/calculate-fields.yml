name: Project Calculator Logic

concurrency:
  group: calculate-fields-${{ inputs.org || 'intellicloud' }}-${{ inputs.project_number || '192' }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  # Fires immediately when a project item is created or a field value is edited
  projects_v2_item:
    types: [created, edited]

  # Hourly safety-net to catch anything missed (API delays, race conditions)
  schedule:
    - cron: '0 * * * *'

  workflow_dispatch:
    inputs:
      org:
        required: false
        type: string
        default: intellicloud
      project_number:
        required: false
        type: string
        default: '192'
  workflow_call:
    inputs:
      org:
        required: false
        type: string
        default: intellicloud
      project_number:
        required: false
        type: number
        default: 192
    secrets:
      ORG_APP_ID:
        required: false
      ORG_APP_PRIVATE_KEY:
        required: false

jobs:
  calculate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.ORG_APP_ID }}
          private-key: ${{ secrets.ORG_APP_PRIVATE_KEY }}
          owner: ${{ inputs.org || 'intellicloud' }}

      - name: Calculate Total Score for all project items
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ORG: ${{ inputs.org || 'intellicloud' }}
          PROJECT_NUMBER: ${{ inputs.project_number || '192' }}
        run: |
          set -euo pipefail

          # 1. Dynamically resolve project node ID and field IDs via GraphQL
          PROJECT_DATA=$(gh api graphql -f query='
            query($org: String!, $number: Int!) {
              organization(login: $org) {
                projectV2(number: $number) {
                  id
                  fields(first: 30) {
                    nodes {
                      ... on ProjectV2Field {
                        id
                        name
                      }
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options { id name }
                      }
                      ... on ProjectV2IterationField {
                        id
                        name
                      }
                    }
                  }
                }
              }
            }
          ' -f org="$ORG" -F number="$PROJECT_NUMBER")

          PROJECT_NODE_ID=$(echo "$PROJECT_DATA" | jq -r '.data.organization.projectV2.id')
          TOTAL_FIELD_ID=$(echo "$PROJECT_DATA" | jq -r '.data.organization.projectV2.fields.nodes[] | select(.name == "Total") | .id')

          echo "Project node ID: $PROJECT_NODE_ID"
          echo "Total field ID:  $TOTAL_FIELD_ID"

          if [[ -z "$PROJECT_NODE_ID" || -z "$TOTAL_FIELD_ID" ]]; then
            echo "Could not resolve project or Total field. Aborting."
            exit 1
          fi

          # GraphQL query uses $after variable — no cursor string interpolation (injection-safe)
          ITEMS_QUERY='
            query($org: String!, $number: Int!, $after: String) {
              organization(login: $org) {
                projectV2(number: $number) {
                  items(first: 50, after: $after) {
                    pageInfo { hasNextPage endCursor }
                    nodes {
                      id
                      fieldValues(first: 20) {
                        nodes {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            field { ... on ProjectV2SingleSelectField { name } }
                            name
                          }
                          ... on ProjectV2ItemFieldNumberValue {
                            field { ... on ProjectV2Field { name } }
                            number
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          '

          # 2. Paginate through all project items
          CURSOR=""
          while true; do
            # Pass cursor only when non-empty — omitting it sends null to the GraphQL variable
            EXTRA_ARGS=()
            [[ -n "$CURSOR" ]] && EXTRA_ARGS+=(-f "after=$CURSOR")

            PAGE=$(gh api graphql \
              -f query="$ITEMS_QUERY" \
              -f org="$ORG" \
              -F number="$PROJECT_NUMBER" \
              "${EXTRA_ARGS[@]}")

            HAS_NEXT=$(echo "$PAGE" | jq -r '.data.organization.projectV2.items.pageInfo.hasNextPage')
            CURSOR=$(echo "$PAGE" | jq -r '.data.organization.projectV2.items.pageInfo.endCursor')
            ITEM_COUNT=$(echo "$PAGE" | jq '.data.organization.projectV2.items.nodes | length')
            echo "DEBUG page: hasNext=$HAS_NEXT itemCount=$ITEM_COUNT"
            echo "DEBUG raw errors: $(echo "$PAGE" | jq -c '.errors // empty')"

            # Extract all fields for every item in a single jq call (tab-separated)
            while IFS=$'\t' read -r ITEM_ID PRIORITY_TEXT SIZE_TEXT PLUS_VALUE; do
              echo "DEBUG $ITEM_ID fields: P=$PRIORITY_TEXT S=$SIZE_TEXT PV=$PLUS_VALUE"

              case "$PRIORITY_TEXT" in
                "P0") PRIORITY_NUM=3 ;;
                "P1") PRIORITY_NUM=2 ;;
                "P2") PRIORITY_NUM=1 ;;
                *)    PRIORITY_NUM=0 ;;
              esac

              case "$SIZE_TEXT" in
                "XS") HEURES=4 ;;
                "S")  HEURES=8 ;;
                "M")  HEURES=16 ;;
                "L")  HEURES=40 ;;
                "XL") HEURES=80 ;;
                *)    HEURES=0 ;;
              esac

              if [[ -z "$PLUS_VALUE" || "$PRIORITY_NUM" == "0" || "$HEURES" == "0" ]]; then
                echo "Skipping $ITEM_ID — Priority=$PRIORITY_TEXT, Size=$SIZE_TEXT, PlusValue=$PLUS_VALUE"
                continue
              fi

              TOTAL=$(printf "%.0f" $(echo "scale=6; (($PLUS_VALUE * 3) + ($PRIORITY_NUM * 2)) / ($HEURES * 1.2) * 100" | bc))
              echo "Item $ITEM_ID => P=$PRIORITY_TEXT($PRIORITY_NUM) S=$SIZE_TEXT(${HEURES}h) PV=$PLUS_VALUE => Total=$TOTAL"

              gh project item-edit \
                --id "$ITEM_ID" \
                --project-id "$PROJECT_NODE_ID" \
                --field-id "$TOTAL_FIELD_ID" \
                --number "$TOTAL"

            done < <(echo "$PAGE" | jq -r '
              .data.organization.projectV2.items.nodes[] | . as $item |
              [
                $item.id,
                ([$item.fieldValues.nodes[] | select(.field.name == "Priority") | .name][0] // ""),
                ([$item.fieldValues.nodes[] | select(.field.name == "Size")     | .name][0] // ""),
                ([$item.fieldValues.nodes[] | select(.field.name == "Plus Value") | (.number // .name) | tostring][0] // "")
              ] | join("\t")
            ')

            [[ "$HAS_NEXT" == "true" ]] || break
          done

          echo "Done."
